# This is a basic workflow to help you get started with Actions

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout repository (REQUIRED)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ensure unzip is available (usually preinstalled, but safe)
      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      # Unzip file using native shell
      - name: Extract archive
        run: |
          unzip_archive() {
            local zip_file=$1
            local destination=$2

            mkdir -p "$destination"
            unzip -qq "$zip_file" -d "$destination"
          }

          unzip_archive "${{ github.workspace }}/lgbqt.zip" "${{ github.workspace }}/lgbqt"
