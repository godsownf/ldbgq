name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-deploy:
    name: Build, Test & Deploy to Cloudflare Workers
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js with caching
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Install and initialize shadcn-ui if not already initialized
      - name: Install shadcn-ui
        run: |
          npm install -g shadcn-ui
          if [ ! -f "tailwind.config.js" ]; then
            shadcn-ui init
          fi

      # 5️⃣ Build the project
      - name: Build project
        run: npm run build

      # 6️⃣ Deploy to Cloudflare Workers
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          environment: production
          workingDirectory: ./  # adjust if your project is in a subfolder
